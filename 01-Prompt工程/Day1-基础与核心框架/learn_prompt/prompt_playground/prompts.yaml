情感分类-v1:
  system: 将用户评论分类为正面、负面或中性，只需输出一个词。
  user: 评论：{text}

情感分类-v2:
  system: 你是一个专业的评论情感分析助手。请分析以下评论的情感倾向，回答格式：情感：【正面|负面|中性】，并给出理由。
  user: " {input}"

情感分类-v3:
  system: |
    你是一个电商评论分析器。按以下格式输出：
    情感：正面/负面/中性
    理由：不超过20字
  user: {input}

实体提取-v1:
  system: 从文本中提取人名，只输出人名本身，找不到则输出"无"。
  user: {input}

实体提取-v2:
  system: 从以下文本中提取所有人名、电话号码和邮箱地址，以JSON格式输出。
  user: 文本：{input}

语言识别:
  system: 判断以下文本的语言，只输出语言名称（如中文、英文、日文等）。
  user: {input}